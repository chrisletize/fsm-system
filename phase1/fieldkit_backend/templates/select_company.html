<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Company - FieldKit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .select-container {
            max-width: 900px;
            margin: 3rem auto;
        }
        
        .select-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .select-header h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .select-header p {
            color: #666;
            font-size: 1.1rem;
        }
        
        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .company-card {
            background-color: white;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }
        
        .company-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .company-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }
        
        .company-card h2 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .company-card p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .logout-link {
            text-align: center;
            margin-top: 3rem;
        }
        
        .logout-link a {
            color: #666;
            text-decoration: none;
        }
        
        .logout-link a:hover {
            color: #333;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="select-container">
        <div class="select-header">
            <h1>Welcome, {{ session.full_name }}!</h1>
            <p>Select a company to continue</p>
        </div>
        
        <div class="companies-grid">
            {% for company in companies %}
            <a href="/switch/{{ company.key }}" class="company-card">
                <div class="company-icon" style="background-color: {{ company.color_primary }};">
                    {{ company.short_name[0] }}
                </div>
                <h2>{{ company.name }}</h2>
                <p>{{ company.short_name }}</p>
            </a>
            {% endfor %}
        </div>
        
        <div class="logout-link">
            <a href="/logout">Logout</a>
        </div>
    </div>
    
    <script>
        // Add right-click context menu hint
        document.querySelectorAll('.company-card').forEach(card => {
            card.addEventListener('contextmenu', function(e) {
                // Allow default right-click behavior (open in new tab)
                console.log('Right-click to open in new tab!');
            });
        });
    </script>
</body>
</html>
